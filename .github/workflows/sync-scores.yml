name: Football Live Score Sync

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  sync:
    name: Sync Matches to Firestore
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Run sync script
        working-directory: backend
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }} 
        run: node sync.js

      - name: Report success
        if: success()
        run: echo "Sync completed at $(date -u)"

      - name: Report failure
        if: failure()
        run: echo "Sync FAILED at $(date -u)"
